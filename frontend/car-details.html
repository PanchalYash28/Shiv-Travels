<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Car Details - Shiv Travels</title>
  <link rel="stylesheet" href="car-details.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="brand">Shiv Travels</h1>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="create-account.html">Create Account</a>
      </nav>
    </div>
  </header>

  <main class="container" id="details-container">
    <div id="car-details" class="car-details">
      <!-- Populated dynamically -->
    </div>
    <style>
    .gallery-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .gallery {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      /* justify-content: center; */
      align-items: center;
      width: 100%;
      scroll-behavior: smooth;
    }
    .gallery::-webkit-scrollbar { display: none; }
    .gallery img {
      height: 240px;
      border-radius: var(--radius);
      flex-shrink: 0;
      object-fit: cover;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin: 0 auto;
      display: block;
    }
    .scroll-btn {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1.5rem;
      color: #1d4ed8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: background 0.2s;
      z-index: 2;
    }
    .scroll-btn:hover {
      background: #e0e7ff;
    }
    </style>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2025 Shiv Travels | Contact us:
        <a href="https://wa.me/919824926485" target="_blank">WhatsApp</a>
      </p>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="car-details.js"></script>
</body>
</html>
